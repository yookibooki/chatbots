name: Bug report
description: Report a broken link, icon issue, or layout bug
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a problem.
  - type: input
    id: page
    attributes:
      label: Affected link or tile
      placeholder: https://...
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: What happened?
      description: Describe what you saw.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Safari
        - Firefox
        - Edge
        - Other
