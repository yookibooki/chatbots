name: Bug report
description: Report a broken link, icon issue, or layout bug
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a problem.
  - type: input
    id: affected_tile
    attributes:
      label: Affected link or tile
      placeholder: https://...
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Chrome, Safari, Firefox, Edge...
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS, Windows, Linux...
    validations:
      required: false
  - type: textarea
    id: details
    attributes:
      label: What happened?
      description: Describe the problem and where you saw it.
      placeholder: The tile opens a 404 page.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: The tile should open the correct service.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or notes
      description: Add a screenshot or any extra context.
